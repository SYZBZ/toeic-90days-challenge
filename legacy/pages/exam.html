<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>模擬考 — TOEIC 875</title>
<link rel="stylesheet" href="../css/style.css">
</head>
<body>
<nav id="main-nav"></nav>

<div class="container">
  <h1>模擬考 📝</h1>
  <p class="muted">練習 TOEIC L&R 閱讀測驗（Part 5 / 6 / 7）。</p>

  <div class="card-grid">
    <div class="card">
      <h3>Part 5 — 單句填空</h3>
      <p class="muted">文法與單字選擇，單句。</p>
      <div class="row">
        <a class="btn" href="exam-session.html?mode=part5&count=10&time=5">10 題 5 分鐘</a>
        <a class="btn secondary" href="exam-session.html?mode=part5&count=20&time=10">20 題 10 分鐘</a>
      </div>
    </div>
    <div class="card">
      <h3>Part 6 — 段落填空</h3>
      <p class="muted">短文中四個空格。</p>
      <div class="row">
        <a class="btn" href="exam-session.html?mode=part6&count=8&time=8">8 題 8 分鐘</a>
        <a class="btn secondary" href="exam-session.html?mode=part6&count=16&time=16">16 題 16 分鐘</a>
      </div>
    </div>
    <div class="card">
      <h3>Part 7 — 閱讀理解</h3>
      <p class="muted">文章後數題理解題。</p>
      <div class="row">
        <a class="btn" href="exam-session.html?mode=part7&count=10&time=15">10 題 15 分鐘</a>
        <a class="btn secondary" href="exam-session.html?mode=part7&count=20&time=30">20 題 30 分鐘</a>
      </div>
    </div>
    <div class="card">
      <h3>🔥 完整模擬考</h3>
      <p class="muted">Part 5 + 6 + 7，75 分鐘 100 題。</p>
      <div class="row">
        <a class="btn danger" href="exam-session.html?mode=full&time=75">開始模擬考</a>
      </div>
    </div>
    <div class="card">
      <h3>📌 錯題複習</h3>
      <p class="muted">自動抽出過去錯過的題目。</p>
      <div class="row">
        <a class="btn warn" href="exam-session.html?mode=mistakes&count=20&time=15">20 題 15 分鐘</a>
      </div>
    </div>
  </div>

  <div class="card mt-20">
    <h2>📊 歷次成績</h2>
    <div id="history"></div>
  </div>
</div>

<script src="../data/data.js"></script>
<script src="../js/storage.js"></script>
<script src="../js/app.js"></script>
<script>
App.init('exam.html');

function renderHistory() {
  const h = Storage.getExamHistory();
  const el = document.getElementById('history');
  if (!h.length) {
    el.innerHTML = '<div class="empty">尚無紀錄。做一次模擬考吧！</div>';
    return;
  }
  const rows = h.slice(-20).reverse();
  el.innerHTML = `
    <table style="width:100%; border-collapse:collapse;">
      <thead>
        <tr style="border-bottom:1px solid var(--border)">
          <th style="text-align:left; padding:8px">日期</th>
          <th style="text-align:left; padding:8px">題型</th>
          <th style="text-align:right; padding:8px">分數</th>
          <th style="text-align:right; padding:8px">正確率</th>
          <th style="text-align:right; padding:8px">用時</th>
          <th style="text-align:right; padding:8px">操作</th>
        </tr>
      </thead>
      <tbody>
        ${rows.map(r => {
          const hasSnapshot = Array.isArray(r.questions) && r.questions.length > 0;
          const reviewCell = hasSnapshot && r.id
            ? `<a class="btn small" href="exam-session.html?review=${encodeURIComponent(r.id)}">📖 回顧</a>`
            : '<span class="muted" title="此紀錄無題目快照">—</span>';
          return `
            <tr style="border-bottom:1px solid var(--border)">
              <td style="padding:8px">${new Date(r.date).toLocaleString('zh-TW')}</td>
              <td style="padding:8px">${r.mode || r.part}</td>
              <td style="padding:8px; text-align:right">${r.score}/${r.total}</td>
              <td style="padding:8px; text-align:right">${((r.score/r.total)*100).toFixed(0)}%</td>
              <td style="padding:8px; text-align:right">${Math.round((r.timeSpent||0)/60)} 分</td>
              <td style="padding:8px; text-align:right">${reviewCell}</td>
            </tr>
          `;
        }).join('')}
      </tbody>
    </table>
    <p class="muted" style="margin-top:10px; font-size:13px">📖 回顧 = 重新看那次出的題目、你的作答、正解與解析（含中英對照，若已生成翻譯）。</p>`;
}
renderHistory();
</script>
</body>
</html>
